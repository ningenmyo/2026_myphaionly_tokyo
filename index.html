const bdata={};
const checked=new Set(JSON.parse(localStorage.getItem('checked')||'[]'));
function getType(k){
  if(k.startsWith('ア')) return 'wall';
  if(k==='キ49'||k==='キ33') return 'end';
  return 'ki';
}
let lastSelected=null;
document.querySelectorAll('.booth,.ecap,.wbooth').forEach(el=>{
  const k=el.dataset.k;
  if(PRESET[k]) bdata[k]={...PRESET[k]};
  else if(!bdata[k]) bdata[k]={name:'(미입력)',nickname:'',account:'',accountUrl:'',price:'',memo:'',items:[]};
  if(checked.has(k)) el.classList.add('on');
  el.addEventListener('click',()=>{
    if(lastSelected&&lastSelected!==k){
      checked.delete(lastSelected);
      document.querySelectorAll(`[data-k="${lastSelected}"]`).forEach(e=>e.classList.remove('on'));
    }
    if(lastSelected===k){
      checked.delete(k);
      el.classList.remove('on');
      lastSelected=null;
      renderList();
      return;
    }
    checked.add(k);
    el.classList.add('on');
    lastSelected=k;
    localStorage.setItem('checked',JSON.stringify([...checked]));
    renderList();
    const d=bdata[k];
    const tip=document.getElementById('tip');
    document.getElementById('tn').textContent=k+(d.memo&&d.memo!==k?' ('+d.memo+')':'');
    document.getElementById('tnm').textContent=d.nickname||d.name;
    document.getElementById('th').textContent='✓ 선택됨';
    tip.style.display='block';
    tip.style.left='50%';tip.style.transform='translateX(-50%)';tip.style.top='80px';
    setTimeout(()=>{tip.style.display='none';tip.style.transform='';},1600);
  });
});
const bought=new Set(JSON.parse(localStorage.getItem('bought')||'[]'));
function toggleBought(id){bought.has(id)?bought.delete(id):bought.add(id);localStorage.setItem('bought',JSON.stringify([...bought]));renderList();}
const ORDER=['キ49','キ50','キ51','キ52','キ53','キ54','キ55','キ56','キ48','キ47','キ46','キ45','キ44','キ43','キ42','キ57','キ58','キ59','キ60','キ61','キ62','キ63','キ64','キ41','キ40','キ39','キ38','キ37','キ36','キ35','キ34','キ33','ア1'];
function itemTags(it){
  let t='';
  if(it.r18) t+='<span class="item-r18">R18</span>';
  if(it.anth) t+='<span class="item-anth">앤솔</span>';
  if(it.manga) t+='<span class="item-manga">만화</span>';
  if(it.novel) t+='<span class="item-novel">글</span>';
  if(it.free) t+='<span class="item-free">무료</span>';
  return t;
}
function makeAcctHtml(k,d){
  const m=ACCOUNTS[k];
  if(m){let h='';for(let i=0;i<m.length;i+=2)h+=`<a class="ci-acct" href="${m[i]}">${m[i+1]}</a>`;return h;}
  if(k==='キ48') return `<a class="ci-acct" href="https://x.com/wanaka_itosiki">@wanaka_itosiki</a><a class="ci-acct" href="https://x.com/yohiraori">@yohiraori</a>`;
  if(k==='キ46') return `<a class="ci-acct" href="https://www.pixiv.net/users/6813000">pixiv(守屋)</a><a class="ci-acct" href="https://x.com/SAHINAGentou">@SAHINAGentou</a>`;
  if(k==='キ34') return `<a class="ci-acct" href="https://x.com/ari_eos">@ari_eos</a><a class="ci-acct" href="https://x.com/AoiAkira0705">@AoiAkira0705</a><a class="ci-acct" href="https://x.com/okanon496">@okanon496</a>`;
  if(d.accountUrl) return `<a class="ci-acct" href="${d.accountUrl}">${d.account}</a>`;
  if(d.account) return `<span class="ci-acct">${d.account}</span>`;
  return '';
}
function renderList(){
  const cnt=checked.size;
  document.getElementById('pcnt').textContent=cnt>0?`(${cnt}개)`:'';
  const el=document.getElementById('clist');
  if(!cnt){el.innerHTML='<p class="empty">부스를 탭해서 체크해봐~</p>';return;}
  const sorted=[...checked].sort((a,b)=>(ORDER.indexOf(a)<0?999:ORDER.indexOf(a))-(ORDER.indexOf(b)<0?999:ORDER.indexOf(b)));
  el.innerHTML=sorted.map(k=>{
    const t=getType(k);const d=bdata[k];
    const numLabel=k+(d.memo&&d.memo!==k?' ('+d.memo+')':'');
    const stampHtml=d.stamp?'<span class="stamp-badge">스탬프랠리 본부</span>':'';
    const nickHtml=d.nickname?`<div class="ci-nick">${d.nickname}</div>`:'';
    const acctHtml=makeAcctHtml(k,d);
    const infoOnly=(!d.items||!d.items.length)?'<p class="info-only">인포 미공개</p>':'';
    const itemsHtml=d.items&&d.items.length?`<div class="items-block"><div class="items-title">판매물</div>${d.items.map((it,i)=>{const isB=it.note&&/[キア]\d+b/.test(it.note);const bid=k+'_'+i;const isBought=bought.has(bid);return`<div class="item-row${isB?' item-b':''}${isBought?' bought':''}"><input type="checkbox" class="item-check"${isBought?' checked':''} onchange="toggleBought('${bid}')"><span class="item-label">${it.label}${itemTags(it)}</span><span class="${it.price==='미정'?'item-tbd':'item-price'}">${it.price}</span></div>${it.note?`<div class="item-note${isB?' item-b':''}">${it.note}</div>`:''}`}).join('')}</div>`:'';
    return `<div class="ci ${t}">
      <div class="ci-top"><span class="ci-num">${numLabel}</span>${stampHtml}<div style="flex:1"><div class="ci-nm">${d.name}</div>${nickHtml}<div>${acctHtml}</div></div></div>
      <div class="fields">
        <div class="frow"><label>메모</label><input type="text" placeholder="메모" value="${d.memo||''}" oninput="bdata['${k}'].memo=this.value"></div>
      </div>
      ${infoOnly}${itemsHtml}
    </div>`;
  }).join('');
}
